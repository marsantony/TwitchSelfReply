<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Twitch自動回覆</title>
    <link rel="icon" href="start.gif" type="image/gif" />
    <link rel="stylesheet" href="https://marsantony.github.io/shared/nav.css">
    <style>body { padding-top: 56px; }</style>
</head>

<body>

    <div class="mx-auto col-10 col-md-8 col-lg-6">
        <br />
        <br />
        <div class="form-group">
            <label for="username">使用者帳號</label>
            <input type="text" id="username" class="form-control" />
        </div>
        <div class="form-group">
            <label for="password">OAuth密碼</label>
            <a href="https://twitchapps.com/tmi/" class="link-info" target="_blank">Twitch取得oauth password</a>
            <input type="password" id="password" class="form-control" />
        </div>

        <div class="form-group">
            <label for="gameName">自訂遊戲名稱</label>
            <input type="text" id="gameName" class="form-control" />
        </div>

        <div class="form-group">
            <label for="commandReplyTemplate">!遊戲指令Template(MOD)(遊戲名稱會帶入{game})</label>
            <input type="text" id="commandReplyTemplate" class="form-control" />
        </div>

        <br />
        <div class="form-group" style="text-align:right;">
            <div class="row">
                <div class="col-7"></div>
                <div class="accordion col-5">
                    <div class="accordion-item">
                        <h2 class="accordion-header" id="headingOne">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                                全部教學
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne" data-bs-parent="#accordionExample">
                            <div class="accordion-body">
                                <a href="https://youtu.be/0tALZ0xlfec" class="link-info" target="_blank"><i class="bi bi-film">立即回覆並更新(MOD) 教學</i></a>
                                <br />
                                <a href="https://youtu.be/lpnocSfG-f0" class="link-info" target="_blank"><i class="bi bi-film">開始自動回覆並更新(MOD) 教學</i></a>
                                <br />
                                <a href="https://youtu.be/IiMNW3lS1xE" class="link-info" target="_blank"><i class="bi bi-film">開始自動回覆 教學</i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <br />
            <input type="button" id="immediatelyReplyMOD" class="btn btn-success" value="立即回覆並更新(MOD)">

            <input type="button" id="autoReplyMOD" class="btn btn-success" value="開始自動回覆並更新(MOD)" />
            <input type="button" id="startReplyMOD" class="btn btn-success" value="開始自動回覆並更新(MOD)" style="display:none;" />
            <input type="button" id="stopReplyMOD" class="btn btn-danger" value="停止回覆(MOD)" style="display:none;" />

            <input type="button" id="autoReply" class="btn btn-primary" value="開始自動回覆" />
            <input type="button" id="startReply" class="btn btn-primary" value="開始自動回覆" style="display:none;" />
            <input type="button" id="stopReply" class="btn btn-danger" value="停止回覆" style="display:none;" />

        </div>
        <br />


        <div class="form-group">
            <label for="currentSteamGameName">steam抓到的目前遊戲名稱：</label>
            <span id="currentSteamGameName"></span>
        </div>

        <div class="form-group">
            <label for="currentCommandReplyGameName">上一個!遊戲指令的遊戲名稱：</label>
            <span id="currentCommandReplyGameName"></span>
        </div>
        <div class="form-group">
            <label for="log">回覆的LOG：</label>
            <textarea id="log" class="form-control" rows="10" style="resize: none;" readonly></textarea>
        </div>
    </div>


    <div class="container">
        <footer class="py-3">
            <hr/>
            <div class="row">
                <div class="col-12">
                    <small><a href="https://www.flaticon.com/free-animated-icons/on" title="on animated icons">On animated icons created by Freepik - Flaticon</a></small>
                </div>
            </div>
        </footer>
    </div>


    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
    <script src="./js/tmi.min.js"></script>
    <script src="./src/utils.js"></script>
    <script src="./src/selfReplyClass.js"></script>

    <script src="https://marsantony.github.io/shared/shared.js"></script>
    <script>
        document.getElementById('username').value = localStorage.getItem(STORAGE_USERNAME) || '';
        document.getElementById('password').value = sessionStorage.getItem(STORAGE_PASSWORD) || '';
        document.getElementById('commandReplyTemplate').value = localStorage.getItem(STORAGE_COMMANDREPLYTEMPLATE) || '';

        new selfReplyClass({
            firstButtonName: 'autoReply',
            startButtonName: 'startReply',
            stopButtonName: 'stopReply',
            getMessage: function (currentGameName, otherMessage) {
                var other = otherMessage ? ` 額外留言：${otherMessage}` : '';
                return `MrDestructoid 自動回覆：「目前遊戲名稱：${currentGameName}」${other}`;
            }
        }).init();

        new selfReplyClass({
            firstButtonName: 'autoReplyMOD',
            startButtonName: 'startReplyMOD',
            stopButtonName: 'stopReplyMOD',
            getMessage: function (currentGameName, otherMessage) {
                const fullMessage = replaceGamePlaceholder(document.getElementById('commandReplyTemplate').value, currentGameName);
                return `!command edit !遊戲 ${fullMessage}`;
            },
            immediatelyButtonName: 'immediatelyReplyMOD',
            commandName: '更新遊戲',
        }).init();
    </script>
</body>

</html>
